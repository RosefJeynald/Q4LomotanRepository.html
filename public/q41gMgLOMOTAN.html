<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Q4 1st Graded Exercise">
<meta name="keywords" content="CRUD Operations">
<meta name="author" content="RJ Lomotan">
<title>4Q - 1st Graded</title>
  <style>

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #f0f0f0, #ffffff99);
      font-family: Tahoma, Verdana, "sans-serif";
    }

    form {
      width: 650px;
      padding: 30px;
      border-radius: 15px;
      background-color: #ffffff8b;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
    }

    h2 {
      text-align: center;
      font-size: 30px;
      margin-bottom: 20px;
    }

    h3 {
      text-align: center;
      font-size: 20px
    }

    b {
      font-size: 20px;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      margin-bottom: 20px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    .stars {
      font-size: 40px;
      margin-bottom: 25px;
      cursor: pointer;
    }

    .star {
      color: #cbcbcb84;
    }

    .star.checked {
      color: rgb(255, 224, 47);
    }

    button {
      width: 650px;
      padding: 15px;
      border: none;
      border-radius:10px;
      font-size: 20px;
      cursor: pointer;
      background-color: #3c8fe2;
      color: white;
      }

    button:hover {
      background-color: #7fbcf9;
    }

    .movie-item {
      background: #eeeeee;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .delete-btn {
      background-color: crimson;
      padding: 6px 12px;
      border-radius: 6px;
      border: none;
      color: white;
      cursor: pointer;
    }

    .delete-btn:hover {
      background-color: darkred;
    }

  </style>
</head>
<body> 
<section>
  <form id="addMovie">

    <h2> Add a Movie </h2> 

      <label>
      <b> Title: </b> <br>  
        <input type="text" name="title" id="title" required/> <br> <br>
      </label>

      <label>
      <b> Year: </b> <br>
        <input type="number" name="year" id="year" required/> <br> <br>
      </label>

      <label>
      <b> Genre: </b> <br>
        <select name="genre" id="genre" required>
          <option value="action">Action</option>
          <option value="sci-fi">Sci-Fi</option>
          <option value="thriller">Thriller</option>
          <option value="horror">Horror</option>
          <option value="drama">Drama</option>
          <option value="romance">Romance</option>
          <option value="musical">Musical</option>
        </select> <br> <br>
      </label>

      <label>
      <b> Rating: </b>
      <div class="stars" required>
        <span class="star" data-value="1">&#9733;</span>
        <span class="star" data-value="2">&#9733;</span>
        <span class="star" data-value="3">&#9733;</span>
        <span class="star" data-value="4">&#9733;</span>
        <span class="star" data-value="5">&#9733;</span>
      </div>
      </label>

      <button type="submit"> Add Movie </button>

      <h3>Movie List</h3>
      <div id="movieList"></div>

  </form>
</section>

<script>
  
let rating = 0;
const stars = document.querySelectorAll(".star");
const movieList = document.getElementById("movieList");

//star checker
stars.forEach((star, index) => {
  star.onclick = () => {
    rating = index + 1; 

    stars.forEach((s, i) => {
      s.classList.toggle("checked", i < rating);
    });
  };
});
//star checker

//display
function displayMovies() {
  movieList.innerHTML = "";
  const movies = JSON.parse(localStorage.getItem("movies")) || [];

  movies.forEach((movie, index) => {

    const div = document.createElement("div");
    div.className = "movie-item";

    const starDisplay = "★".repeat(movie.rating);

    div.innerHTML = `
      <span>
      ${movie.title} (${movie.year}) - ${movie.genre}, Rating:
      <span style="color:gold;">${starDisplay}</span>
      </span>
      <button class="delete-btn" onclick="deleteMovie(${index})">Delete</button>
    `;

    movieList.appendChild(div);
  });
}
//display

//updater/adder
document.getElementById("addMovie").onsubmit = function(f) {
  f.preventDefault();

  const title = document.getElementById("title").value.trim();
  const year = document.getElementById("year").value;
  const genre = document.getElementById("genre").value;

  let movies = JSON.parse(localStorage.getItem("movies")) || [];

  const existingIndex = movies.findIndex(m => 
    m.title.toLowerCase() === title.toLowerCase()
  );

  if (existingIndex !== -1) {
    const oldRating = movies[existingIndex].rating;
    const newAverage = Math.round((oldRating + rating) / 2);

    movies[existingIndex] = {
      title,
      year,
      genre,
      rating: newAverage
    };

  } else {
    movies.push({
      title,
      year,
      genre,
      rating
    });
  }

  localStorage.setItem("movies", JSON.stringify(movies));

  this.reset();
  rating = 0;
  stars.forEach(s => s.classList.remove("checked"));

  displayMovies();
}
//updater/adder

//delete
function deleteMovie(index) {
  const confirmDelete = confirm("Are you sure you want to delete this movie?");
  
  if (confirmDelete) {
    let movies = JSON.parse(localStorage.getItem("movies")) || [];
    movies.splice(index, 1);
    localStorage.setItem("movies", JSON.stringify(movies));
    displayMovies();
  }
}
//delete

//refresh
displayMovies();
</script>
</body>
</html>
